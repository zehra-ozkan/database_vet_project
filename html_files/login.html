<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - VetChain</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-center">
    <div class="auth-card">
      <div class="brand" style="justify-content: center; margin-bottom: 24px;">
        <div class="mark"></div>
        <div>
          <strong>VetChain</strong>
          <span>Clinic Network</span>
        </div>
      </div>
      <h1>Sign in</h1>
      <p class="sub muted">Enter your credentials to access your account</p>

      <form>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
        <div class="form-group mt-2">
          <button type="submit" class="btn block">Sign in</button>
        </div>
      </form>

      <p class="muted" style="text-align: center; font-size: 14px; margin-top: 20px;">
        Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Register</a>
      </p>
    </div>
  </div>
</body>
</html>
